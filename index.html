<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Robot Transform</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>ROBOT TRANSFORM</h1>
  <p>Машины, которые превращаются в роботов</p>
</header>

<section class="hero">
  <h2>Добро пожаловать в мир трансформации</h2>
  <button onclick="scrollToSection()">Смотреть модели</button>
</section>

<section id="models">
  <h2>Модели трансформации</h2>

  <div class="grid">

    <div class="card transform-card">
      <img src="https://via.placeholder.com/300x200.png?text=Car+Bot+1">
      <h3>Cyber Truck Bot</h3>
      <button onclick="transform(this)">TRANSFORM</button>
    </div>

    <div class="card transform-card">
      <img src="https://via.placeholder.com/300x200.png?text=Car+Bot+2">
      <h3>Speed Racer Bot</h3>
      <button onclick="transform(this)">TRANSFORM</button>
    </div>

    <div class="card transform-card">
      <img src="https://via.placeholder.com/300x200.png?text=Car+Bot+3">
      <h3>Urban Fighter Bot</h3>
      <button onclick="transform(this)">TRANSFORM</button>
    </div>

  </div>
</section>

<footer>
  © 2026 Robot Transform
</footer>

<script src="script.js"></script>
</body>
</html>
