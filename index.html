<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Robot Transform</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>ROBOT TRANSFORM</h1>
  <p>Машины, которые превращаются в роботов</p>
</header>

<section class="hero">
  <h2>Добро пожаловать в мир трансформации</h2>
  <button onclick="scrollToSection()">Смотреть модели</button>
</section>

<section id="models">
  <h2>Модели трансформации</h2>

  <div class="grid">

    <!-- 1 -->
    <div class="card transform-card">
      <div class="image-wrapper">
       <img src="https://i.imgur.com/1Q9Z1Zc.jpg"
data-car="https://i.imgur.com/1Q9Z1Zc.jpg"
data-robot="https://i.imgur.com/8QZQZ0r.jpg"
data-state="car">
      </div>

      <h3>Cyber Truck Bot</h3>
      <button onclick="transform(this)">TRANSFORM</button>
    </div>

    <!-- 2 -->
    <div class="card transform-card">
      <div class="image-wrapper">
       <img src="https://i.imgur.com/2cX1K3m.jpg"
data-car="https://i.imgur.com/2cX1K3m.jpg"
data-robot="https://i.imgur.com/9mP7kQb.jpg"
data-state="car">
      </div>

      <h3>Speed Racer Bot</h3>
      <button onclick="transform(this)">TRANSFORM</button>
    </div>

    <!-- 3 -->
    <div class="card transform-card">
      <div class="image-wrapper">
       <img src="https://i.imgur.com/3dL8K2a.jpg"
data-car="https://i.imgur.com/3dL8K2a.jpg"
data-robot="https://i.imgur.com/7hT5pNf.jpg"
data-state="car">
      </div>

      <h3>Urban Fighter Bot</h3>
      <button onclick="transform(this)">TRANSFORM</button>
    </div>

  </div>
</section>

<footer>
  © 2026 Robot Transform
</footer>

<script src="script.js"></script>
</body>
</html>
